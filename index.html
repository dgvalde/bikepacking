<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bikepacking Cloud - David</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJIpNqU_c6LRUVUgdVnguZmSlPmHGcQTY",
            authDomain: "bikepacking-inventory.firebaseapp.com",
            projectId: "bikepacking-inventory",
            storageBucket: "bikepacking-inventory.firebasestorage.app",
            messagingSenderId: "608963104333",
            appId: "1:608963104333:web:9ac5c2641b25065eef9604",
            measurementId: "G-V79L5C6CHX"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();
        
        const appId = 'bikepacking-inventory-david';

        window.FB_SERVICES = { 
            auth, db, appId, googleProvider,
            signInWithPopup, signOut, onAuthStateChanged, 
            collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, writeBatch 
        };
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        button:active { transform: scale(0.95); }
        .gemini-gradient {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
        }
        body { transition: background-color 0.3s ease, color 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        (function() {
            "use strict";
            const { useState, useMemo, useEffect } = React;

            const categoriesList = ["Hardware y Almacenaje", "Ropa de Ciclismo", "Sistema de Sueño", "Ropa de Campamento", "Herramientas y Repuestos", "Electrónica", "Salud y Aseo", "Logística y Nutrición"];
            const zonesList = ["Manillar", "Bici", "Cuadro", "Sillín", "Cuerpo", "Frame Bag", "Seat Pack", "Handlebar Roll", "Top Tube Bag", "Portabidones", "Varios"];

            // LISTA ORIGINAL PARA INICIALIZACIÓN RÁPIDA
            const masterInitialItems = [
                { cat: "Hardware y Almacenaje", name: "Garmin Edge 840", zone: "Manillar", status: "comprado", ready: false },
                { cat: "Hardware y Almacenaje", name: "Luces (x1 delantera, x1 trasera)", zone: "Bici", status: "comprado", ready: false },
                { cat: "Hardware y Almacenaje", name: "Candado ligero (cafe lock)", zone: "Frame Bag", status: "comprado", ready: false },
                { cat: "Hardware y Almacenaje", name: "Bidones de agua (x2)", zone: "Portabidones", status: "comprado", ready: true },
                { cat: "Hardware y Almacenaje", name: "Handlebar roll", zone: "Handlebar Roll", status: "comprado", ready: true },
                { cat: "Hardware y Almacenaje", name: "Frame bag", zone: "Frame Bag", status: "comprado", ready: true },
                { cat: "Hardware y Almacenaje", name: "Seat pack", zone: "Seat Pack", status: "comprado", ready: true },
                { cat: "Hardware y Almacenaje", name: "Top tube bag", zone: "Top Tube Bag", status: "comprado", ready: true },
                { cat: "Hardware y Almacenaje", name: "Voile straps", zone: "Varios", status: "comprado", ready: true },
                { cat: "Hardware y Almacenaje", name: "Cinta de pecho / Pulsómetro", zone: "Cuerpo", status: "comprado", ready: false },
                { cat: "Ropa de Ciclismo", name: "1 Culotte de repuesto", zone: "Seat Pack", status: "comprado", ready: false },
                { cat: "Ropa de Ciclismo", name: "1 Maillot extra (Merino)", zone: "Seat Pack", status: "comprado", ready: false },
                { cat: "Ropa de Ciclismo", name: "Chaleco cortavientos / Gilet", zone: "Seat Pack", status: "comprado", ready: false },
                { cat: "Ropa de Ciclismo", name: "Chaqueta impermeable (Goretex)", zone: "Seat Pack", status: "comprado", ready: true },
                { cat: "Ropa de Ciclismo", name: "Manguitos / Perneras", zone: "Seat Pack", status: "comprado", ready: true },
                { cat: "Sistema de Sueño", name: "Tienda de campaña", zone: "Handlebar Roll", status: "comprado", ready: false },
                { cat: "Sistema de Sueño", name: "Esterilla inflable", zone: "Handlebar Roll", status: "comprado", ready: false },
                { cat: "Sistema de Sueño", name: "Saco de dormir Quechua S5", zone: "Handlebar Roll", status: "comprado", ready: false },
                { cat: "Ropa de Campamento", name: "Camiseta térmica Merino ML", zone: "Seat Pack", status: "comprar", ready: false },
                { cat: "Ropa de Campamento", name: "Chanclas tipo pala", zone: "Seat Pack", status: "comprar", ready: false },
                { cat: "Ropa de Campamento", name: "Chaqueta de plumas (Patagonia)", zone: "Seat Pack", status: "comprado", ready: true },
                { cat: "Herramientas y Repuestos", name: "Mini bomba", zone: "Frame Bag", status: "comprado", ready: true },
                { cat: "Herramientas y Repuestos", name: "Kit reparación tubeless + CO2", zone: "Frame Bag", status: "comprado", ready: true },
                { cat: "Herramientas y Repuestos", name: "Cámara TPU (Tubolito)", zone: "Frame Bag", status: "comprado", ready: true },
                { cat: "Electrónica", name: "Powerbank", zone: "Top Tube Bag", status: "comprado", ready: false },
                { cat: "Salud y Aseo", name: "Botiquín supervivencia", zone: "Frame Bag", status: "comprado", ready: true }
            ];

            const App = () => {
                const [items, setItems] = useState([]);
                const [user, setUser] = useState(null);
                const [loading, setLoading] = useState(true);
                const [isSeeding, setIsSeeding] = useState(false);
                const [filter, setFilter] = useState('All');
                const [sortConfig, setSortConfig] = useState({ key: 'name', direction: 'asc' });
                const [newItem, setNewItem] = useState({ name: '', cat: 'Hardware y Almacenaje', zone: 'Frame Bag' });
                const [darkMode, setDarkMode] = useState(() => localStorage.getItem('theme') === 'dark');
                
                const [editId, setEditId] = useState(null);
                const [editForm, setEditForm] = useState(null);
                const [aiAdvice, setAiAdvice] = useState(null);
                const [isAiLoading, setIsAiLoading] = useState(false);

                const { auth, db, appId, googleProvider, signInWithPopup, signOut, onAuthStateChanged, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, writeBatch } = window.FB_SERVICES;

                useEffect(() => {
                    if (darkMode) {
                        document.documentElement.classList.add('dark');
                        localStorage.setItem('theme', 'dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                        localStorage.setItem('theme', 'light');
                    }
                }, [darkMode]);

                useEffect(() => {
                    const unsubscribe = onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        if (!u) setLoading(false);
                    });
                    return () => unsubscribe();
                }, []);

                useEffect(() => {
                    if (!user) {
                        setItems([]);
                        return;
                    }
                    const inventoryCol = collection(db, 'artifacts', appId, 'users', user.uid, 'inventory');
                    const unsubscribe = onSnapshot(inventoryCol, (snapshot) => {
                        const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                        setItems(data);
                        setLoading(false);
                    }, (error) => { 
                        console.error("Firestore Error:", error); 
                        setLoading(false); 
                    });
                    return () => unsubscribe();
                }, [user]);

                // FUNCIÓN PARA CARGAR LA LISTA INICIAL EN MASA
                const seedInventory = async () => {
                    if (!user || isSeeding) return;
                    if (!confirm("¿Quieres cargar la lista maestra de bikepacking en tu cuenta?")) return;
                    
                    setIsSeeding(true);
                    try {
                        const inventoryCol = collection(db, 'artifacts', appId, 'users', user.uid, 'inventory');
                        
                        // Usamos Batch para mayor eficiencia (máximo 500 docs por batch)
                        const batch = writeBatch(db);
                        masterInitialItems.forEach((item) => {
                            const newDocRef = doc(inventoryCol);
                            batch.set(newDocRef, { ...item, timestamp: Date.now() });
                        });
                        
                        await batch.commit();
                    } catch (error) {
                        console.error("Error al poblar base de datos:", error);
                    } finally {
                        setIsSeeding(false);
                    }
                };

                const handleLogin = async () => {
                    try {
                        await signInWithPopup(auth, googleProvider);
                    } catch (err) { console.error("Login Error:", err); }
                };

                const handleLogout = () => signOut(auth);

                const callGemini = async (prompt) => {
                    const apiKey = ""; // Pega aquí tu clave de Google AI Studio
                    if (!apiKey) return "IA no configurada. Añade la API Key.";
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                systemInstruction: { parts: [{ text: "Eres un experto en bikepacking. Analiza inventarios y da consejos breves." }] }
                            })
                        });
                        const result = await response.json();
                        return result.candidates?.[0]?.content?.parts?.[0]?.text;
                    } catch (err) { return "Error en API IA."; }
                };

                const analyzeInventoryWithAI = async () => {
                    if (!items.length) return;
                    setIsAiLoading(true);
                    const prompt = `Analiza este inventario: ${items.map(i => i.name).join(', ')}`;
                    try {
                        const advice = await callGemini(prompt);
                        setAiAdvice(advice);
                    } finally { setIsAiLoading(false); }
                };

                const addItemCloud = async (e) => {
                    e.preventDefault();
                    if (!newItem.name.trim() || !user) return;
                    const inventoryCol = collection(db, 'artifacts', appId, 'users', user.uid, 'inventory');
                    await addDoc(inventoryCol, { ...newItem, status: 'comprar', ready: false, timestamp: Date.now() });
                    setNewItem({ ...newItem, name: '' });
                };

                const toggleStatusCloud = async (item) => {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'inventory', item.id);
                    await updateDoc(docRef, { status: item.status === 'comprado' ? 'comprar' : 'comprado' });
                };

                const toggleReadyCloud = async (item) => {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'inventory', item.id);
                    await updateDoc(docRef, { ready: !item.ready });
                };

                const deleteItemCloud = async (id) => {
                    if(window.confirm("¿Eliminar objeto?")) {
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'inventory', id);
                        await deleteDoc(docRef);
                    }
                };

                const saveEditCloud = async () => {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'inventory', editId);
                    await updateDoc(docRef, { ...editForm });
                    setEditId(null);
                };

                const sortedAndFilteredItems = useMemo(() => {
                    let result = filter === 'All' ? [...items] : items.filter(i => i.cat === filter);
                    if (sortConfig.key) {
                        result.sort((a, b) => {
                            let valA = a[sortConfig.key];
                            let valB = b[sortConfig.key];
                            if (typeof valA === 'boolean') { valA = valA ? 1 : 0; valB = valB ? 1 : 0; }
                            else { valA = (valA || "").toString().toLowerCase(); valB = (valB || "").toString().toLowerCase(); }
                            if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                            if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                            return 0;
                        });
                    }
                    return result;
                }, [items, filter, sortConfig]);

                const getCatIconClass = (cat) => {
                    switch (cat) {
                        case "Hardware y Almacenaje": return "fa-solid fa-map-location-dot text-blue-500";
                        case "Ropa de Ciclismo": return "fa-solid fa-shirt text-orange-500";
                        case "Sistema de Sueño": return "fa-solid fa-tent text-indigo-500";
                        case "Ropa de Campamento": return "fa-solid fa-campground text-emerald-500";
                        case "Herramientas y Repuestos": return "fa-solid fa-screwdriver-wrench text-slate-500";
                        case "Electrónica": return "fa-solid fa-bolt text-yellow-500";
                        case "Salud y Aseo": return "fa-solid fa-heart-pulse text-red-500";
                        case "Logística y Nutrición": return "fa-solid fa-apple-whole text-amber-600";
                        default: return "fa-solid fa-circle-info text-slate-400";
                    }
                };

                if (loading) return (
                    <div className="flex flex-col items-center justify-center min-h-screen text-slate-400">
                        <i className="fa-solid fa-circle-notch fa-spin text-4xl mb-4"></i>
                        <p className="font-bold uppercase tracking-widest text-xs">Sincronizando...</p>
                    </div>
                );

                if (!user) return (
                    <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-slate-50 dark:bg-slate-900 fade-in">
                        <div className="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-xl border border-slate-200 dark:border-slate-700 max-w-sm w-full text-center">
                            <div className="bg-slate-800 dark:bg-slate-700 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg">
                                <i className="fa-solid fa-bicycle text-white text-4xl"></i>
                            </div>
                            <h1 className="text-2xl font-black text-slate-800 dark:text-white mb-2 tracking-tight">Bikepacking Cloud</h1>
                            <p className="text-slate-500 dark:text-slate-400 text-sm mb-8">Entra con tu cuenta de Google para sincronizar tu inventario.</p>
                            <button 
                                onClick={handleLogin}
                                className="w-full bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 py-3 rounded-xl flex items-center justify-center gap-3 font-bold text-slate-700 dark:text-white hover:bg-slate-50 dark:hover:bg-slate-600 transition-all shadow-sm active:scale-95"
                            >
                                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5" alt="Google" />
                                Entrar con Google
                            </button>
                        </div>
                    </div>
                );

                return (
                    <div className="p-4 md:p-8 max-w-6xl mx-auto fade-in pb-20">
                        <header className="mb-6 bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-4 text-center md:text-left w-full md:w-auto">
                                <img src={user.photoURL} className="w-14 h-14 rounded-2xl border-2 border-white dark:border-slate-600 shadow-md" alt="Avatar" />
                                <div className="flex-1">
                                    <div className="flex items-center justify-between md:justify-start gap-3">
                                        <h1 className="text-xl font-bold text-slate-800 dark:text-white tracking-tight">Hola, {user.displayName.split(' ')[0]}</h1>
                                        <div className="flex gap-1">
                                            <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 transition-colors" title="Tema">
                                                {darkMode ? <i className="fa-solid fa-sun"></i> : <i className="fa-solid fa-moon"></i>}
                                            </button>
                                            <button onClick={handleLogout} className="p-2 rounded-lg bg-red-50 dark:bg-red-900/30 text-red-500 transition-colors" title="Cerrar sesión">
                                                <i className="fa-solid fa-right-from-bracket"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1">Nube Privada Activa</p>
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-3 gap-2 w-full md:w-auto">
                                <div className="bg-slate-50 dark:bg-slate-700/50 px-4 py-3 rounded-2xl border border-slate-100 dark:border-slate-700 text-center min-w-[80px]">
                                    <span className="block text-xl font-black text-slate-700 dark:text-slate-200">{items.length}</span>
                                    <span className="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Total</span>
                                </div>
                                <div className="bg-blue-50 dark:bg-blue-900/30 px-4 py-3 rounded-2xl border border-blue-100 dark:border-blue-900/50 text-center min-w-[80px]">
                                    <span className="block text-xl font-black text-blue-600 dark:text-blue-400">{items.filter(i=>i.status==='comprado').length}</span>
                                    <span className="text-[10px] uppercase font-bold text-blue-400 tracking-wider">Tengo</span>
                                </div>
                                <div className="bg-green-50 dark:bg-green-900/30 px-4 py-3 rounded-2xl border border-green-100 dark:border-green-900/50 text-center min-w-[80px]">
                                    <span className="block text-xl font-black text-green-600 dark:text-green-400">{items.filter(i=>i.ready).length}</span>
                                    <span className="text-[10px] uppercase font-bold text-green-400 tracking-wider">Listos</span>
                                </div>
                            </div>
                        </header>

                        {/* BOTÓN DE INICIALIZACIÓN MÁGICA ✨ */}
                        {items.length === 0 && !loading && (
                            <button 
                                onClick={seedInventory}
                                disabled={isSeeding}
                                className="w-full mb-6 bg-amber-50 dark:bg-amber-900/20 border-2 border-dashed border-amber-200 dark:border-amber-700 p-8 rounded-2xl text-center hover:bg-amber-100 dark:hover:bg-amber-900/30 transition-all group"
                            >
                                <div className="bg-amber-500 text-white w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3 shadow-lg group-hover:scale-110 transition-transform">
                                    {isSeeding ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-bolt-lightning"></i>}
                                </div>
                                <h3 className="text-amber-800 dark:text-amber-400 font-bold uppercase tracking-widest text-xs">Tu inventario está vacío</h3>
                                <p className="text-amber-600 dark:text-amber-500 text-sm mt-1">Pulsa aquí para importar automáticamente la lista maestra original.</p>
                            </button>
                        )}

                        <section className="mb-8 bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-lg border-l-8 border-l-blue-400">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                                <div>
                                    <h2 className="text-lg font-black text-slate-800 dark:text-white flex items-center gap-2 italic uppercase tracking-tighter">
                                        <i className="fa-solid fa-wand-magic-sparkles text-blue-500"></i> Asistente AI ✨
                                    </h2>
                                    <p className="text-slate-400 dark:text-slate-500 text-xs font-bold uppercase tracking-widest">Powered by Gemini</p>
                                </div>
                                <button 
                                    onClick={analyzeInventoryWithAI}
                                    disabled={isAiLoading || items.length === 0}
                                    className={`px-6 py-3 rounded-xl text-white font-black text-xs uppercase tracking-widest shadow-lg flex items-center gap-2 transition-all ${isAiLoading ? 'bg-slate-300 dark:bg-slate-700' : 'gemini-gradient hover:scale-105 active:scale-95'}`}
                                >
                                    {isAiLoading ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-brain"></i>}
                                    Analizar Inventario
                                </button>
                            </div>
                            {aiAdvice && (
                                <div className="bg-blue-50 dark:bg-blue-900/20 p-5 rounded-xl border border-blue-100 dark:border-blue-900/50 text-sm text-slate-700 dark:text-slate-300 leading-relaxed fade-in relative">
                                    <button onClick={() => setAiAdvice(null)} className="absolute top-2 right-2 text-blue-300 hover:text-blue-500">
                                        <i className="fa-solid fa-circle-xmark"></i>
                                    </button>
                                    <div className="prose prose-sm dark:prose-invert max-w-none whitespace-pre-wrap">{aiAdvice}</div>
                                </div>
                            )}
                        </section>

                        <section className="mb-6 bg-white dark:bg-slate-800 p-5 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm">
                            <form onSubmit={addItemCloud} className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <input type="text" placeholder="Nuevo objeto..." className="bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 dark:text-white transition-all" value={newItem.name} onChange={e=>setNewItem({...newItem, name: e.target.value})} />
                                <select className="bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 p-3 rounded-xl text-sm outline-none dark:text-white" value={newItem.cat} onChange={e=>setNewItem({...newItem, cat: e.target.value})}>
                                    {categoriesList.map(c=><option key={c} value={c}>{c}</option>)}
                                </select>
                                <select className="bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 p-3 rounded-xl text-sm outline-none dark:text-white" value={newItem.zone} onChange={e=>setNewItem({...newItem, zone: e.target.value})}>
                                    {zonesList.map(z=><option key={z} value={z}>{z}</option>)}
                                </select>
                                <button type="submit" className="bg-slate-800 dark:bg-blue-600 text-white rounded-xl text-sm font-bold py-3 mt-auto hover:bg-slate-900 dark:hover:bg-blue-700 transition-all flex items-center justify-center gap-2 shadow-lg h-[46px]">
                                    <i className="fa-solid fa-plus"></i> Añadir
                                </button>
                            </form>
                        </section>

                        <div className="flex overflow-x-auto gap-2 mb-6 pb-2 no-scrollbar">
                            {['All', ...categoriesList].map(cat => (
                                <button key={cat} onClick={() => setFilter(cat)} className={`px-5 py-2 rounded-full whitespace-nowrap text-xs font-bold transition-all border ${filter === cat ? 'bg-slate-800 dark:bg-blue-600 text-white border-slate-800 dark:border-blue-600 shadow-md scale-105' : 'bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-slate-700 hover:border-slate-300'}`}>{cat}</button>
                            ))}
                        </div>

                        <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden overflow-x-auto">
                            <table className="w-full text-left border-collapse text-sm min-w-[700px]">
                                <thead className="bg-slate-50 dark:bg-slate-700/50 border-b border-slate-200 dark:border-slate-700 font-bold text-slate-400 dark:text-slate-500 uppercase text-[10px] tracking-widest">
                                    <tr>
                                        <th className="p-4 cursor-pointer" onClick={()=>setSortConfig({key:'name', direction: sortConfig.direction==='asc'?'desc':'asc'})}>Elemento</th>
                                        <th className="p-4 text-center">Estado</th>
                                        <th className="p-4 text-center">Listo</th>
                                        <th className="p-4">Zona</th>
                                        <th className="p-4 text-center">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 dark:divide-slate-700">
                                    {sortedAndFilteredItems.map(item => (
                                        <tr key={item.id} className={`hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors group ${editId === item.id ? 'bg-blue-50/60 dark:bg-blue-900/20' : ''}`}>
                                            <td className="p-4">
                                                {editId === item.id ? (
                                                    <div className="flex flex-col gap-2">
                                                        <input type="text" className="w-full border border-blue-200 dark:border-blue-900 p-2 rounded-lg text-sm font-bold bg-white dark:bg-slate-700 dark:text-white outline-none" value={editForm.name} onChange={e => setEditForm({...editForm, name: e.target.value})} autoFocus />
                                                        <select className="w-full border border-blue-200 dark:border-blue-900 p-2 rounded-lg text-xs bg-white dark:bg-slate-700 dark:text-white outline-none" value={editForm.cat} onChange={e => setEditForm({...editForm, cat: e.target.value})}>
                                                            {categoriesList.map(c => <option key={c} value={c}>{c}</option>)}
                                                        </select>
                                                    </div>
                                                ) : (
                                                    <div className="flex items-center gap-3">
                                                        <div className="bg-white dark:bg-slate-700 p-2 rounded-lg shadow-sm border border-slate-100 dark:border-slate-600 flex items-center justify-center w-10 h-10">
                                                            <i className={`${getCatIconClass(item.cat)} text-lg`}></i>
                                                        </div>
                                                        <div>
                                                            <p className="font-bold text-slate-800 dark:text-slate-200 leading-tight">{item.name}</p>
                                                            <p className="text-[10px] text-slate-400 dark:text-slate-500 uppercase font-black tracking-tight">{item.cat}</p>
                                                        </div>
                                                    </div>
                                                )}
                                            </td>
                                            <td className="p-4 text-center">
                                                <button onClick={()=>toggleStatusCloud(item)} className={`px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter shadow-sm transition-all ${item.status==='comprado' ? 'bg-blue-600 dark:bg-blue-500 text-white' : 'bg-red-500 dark:bg-red-600 text-white'}`}>
                                                    {item.status}
                                                </button>
                                            </td>
                                            <td className="p-4 text-center">
                                                <button onClick={()=>toggleReadyCloud(item)} className="transition-all">
                                                    {item.ready ? (
                                                        <i className="fa-solid fa-circle-check text-green-500 text-2xl"></i>
                                                    ) : (
                                                        <i className="fa-solid fa-circle-exclamation text-yellow-500 dark:text-yellow-600 text-2xl opacity-20 dark:opacity-40 group-hover:opacity-100 transition-opacity"></i>
                                                    )}
                                                </button>
                                            </td>
                                            <td className="p-4">
                                                {editId === item.id ? (
                                                    <select className="w-full border border-blue-200 p-2 rounded-lg text-xs bg-white dark:bg-slate-700 dark:text-white font-bold outline-none" value={editForm.zone} onChange={e => setEditForm({...editForm, zone: e.target.value})}>
                                                        {zonesList.map(z => <option key={z} value={z}>{z}</option>)}
                                                    </select>
                                                ) : (
                                                    <span className="text-[10px] font-black bg-slate-100 dark:bg-slate-700 px-2.5 py-1 rounded-md text-slate-500 dark:text-slate-400 border border-slate-200 dark:border-slate-600 uppercase tracking-tighter">
                                                        {item.zone}
                                                    </span>
                                                )}
                                            </td>
                                            <td className="p-4 text-center">
                                                <div className="flex items-center justify-center gap-2">
                                                    {editId === item.id ? (
                                                        <button onClick={saveEditCloud} className="p-2 bg-green-500 text-white rounded-lg shadow-sm"><i className="fa-solid fa-check"></i></button>
                                                    ) : (
                                                        <>
                                                            <button onClick={() => { setEditId(item.id); setEditForm({...item}); }} className="p-2 text-slate-400 dark:text-slate-500 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded-lg transition-all"><i className="fa-solid fa-pen-to-square"></i></button>
                                                            <button onClick={()=>deleteItemCloud(item.id)} className="p-2 text-slate-300 dark:text-slate-600 hover:text-red-500 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-lg transition-all"><i className="fa-solid fa-trash"></i></button>
                                                        </>
                                                    )}
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            };

            const rootElement = document.getElementById('root');
            if (rootElement) {
                const root = ReactDOM.createRoot(rootElement);
                root.render(<App />);
            }
        })();
    </script>
</body>
</html>
