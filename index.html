<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bikepacking Cloud</title>
    
    <!-- Configuración PWA y Mobile -->
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href='data:application/manifest+json,{"name":"Bikepacking Cloud","short_name":"Bikepacking","start_url":".","display":"standalone","background_color":"#0f172a","theme_color":"#0f172a","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/3774/3774270.png","sizes":"512x512","type":"image/png"}]}'>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, writeBatch, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJIpNqU_c6LRUVUgdVnguZmSlPmHGcQTY",
            authDomain: "bikepacking-inventory.firebaseapp.com",
            projectId: "bikepacking-inventory",
            storageBucket: "bikepacking-inventory.firebasestorage.app",
            messagingSenderId: "608963104333",
            appId: "1:608963104333:web:9ac5c2641b25065eef9604",
            measurementId: "G-V79L5C6CHX"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();
        const appId = 'bikepacking-inventory-david';

        window.FB_SERVICES = { 
            auth, db, appId, googleProvider,
            signInWithPopup, signOut, onAuthStateChanged, 
            collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, writeBatch, getDocs 
        };
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        
        body { 
            transition: background-color 0.3s ease, color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overscroll-behavior-y: contain;
        }
        input, select, textarea { user-select: text; }
        button:active { transform: scale(0.95); }
        
        .header-blur {
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen font-sans">
    <div id="root"></div>

    <script type="text/babel">
        (function() {
            "use strict";
            const { useState, useMemo, useEffect, useRef } = React;

            const categoriesList = ["Hardware y Almacenaje", "Ropa de Ciclismo", "Sistema de Sueño", "Ropa de Campamento", "Herramientas y Repuestos", "Electrónica", "Salud y Aseo", "Logística y Nutrición"];
            const zonesList = ["Manillar", "Bici", "Cuadro", "Sillín", "Cuerpo", "Frame Bag", "Seat Pack", "Handlebar Roll", "Top Tube Bag", "Portabidones", "Varios"];

            const App = () => {
                const [items, setItems] = useState([]);
                const [user, setUser] = useState(null);
                const [loading, setLoading] = useState(true);
                const [catFilter, setCatFilter] = useState('All');
                const [zoneFilter, setZoneFilter] = useState('All');
                const [sortConfig, setSortConfig] = useState({ key: 'timestamp', direction: 'desc' });
                const [newItem, setNewItem] = useState({ name: '', cat: 'Hardware y Almacenaje', zone: 'Frame Bag' });
                const [darkMode, setDarkMode] = useState(() => localStorage.getItem('theme') === 'dark');
                const fileInputRef = useRef(null);
                
                const [editId, setEditId] = useState(null);
                const [editForm, setEditForm] = useState(null);

                const { auth, db, appId, googleProvider, signInWithPopup, signOut, onAuthStateChanged, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, writeBatch, getDocs } = window.FB_SERVICES;

                useEffect(() => {
                    if (darkMode) {
                        document.documentElement.classList.add('dark');
                        localStorage.setItem('theme', 'dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                        localStorage.setItem('theme', 'light');
                    }
                }, [darkMode]);

                useEffect(() => {
                    const unsubscribe = onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        if (!u) setLoading(false);
                    });
                    return () => unsubscribe();
                }, []);

                useEffect(() => {
                    if (!user) {
                        setItems([]);
                        return;
                    }
                    const inventoryCol = collection(db, 'artifacts', appId, 'users', user.uid, 'inventory');
                    const unsubscribe = onSnapshot(inventoryCol, (snapshot) => {
                        const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                        setItems(data);
                        setLoading(false);
                    }, (error) => { 
                        console.error("Firestore Error:", error); 
                        setLoading(false); 
                    });
                    return () => unsubscribe();
                }, [user]);

                const handleLogin = async () => {
                    try {
                        await signInWithPopup(auth, googleProvider);
                    } catch (err) { console.error("Login Error:", err); }
                };

                const handleLogout = () => signOut(auth);

                const exportToCSV = () => {
                    if (items.length === 0) return;
                    const headers = ["Nombre", "Categoria", "Ubicacion", "Estado", "Listo"];
                    const rows = items.map(item => [
                        `"${item.name}"`, `"${item.cat}"`, `"${item.zone}"`,
                        item.status === 'comprado' ? "Tengo" : "Comprar",
                        item.ready ? "SI" : "NO"
                    ]);
                    const csvContent = "\uFEFF" + [headers, ...rows].map(e => e.join(",")).join("\n");
                    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement("a");
                    link.setAttribute("href", url);
                    link.setAttribute("download", `bikepacking_inventory_${new Date().toISOString().split('T')[0]}.csv`);
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                };

                const importCSV = (e) => {
                    const file = e.target.files[0];
                    if (!file || !user) return;

                    const reader = new FileReader();
                    reader.onload = async (event) => {
                        const text = event.target.result;
                        const lines = text.split(/\r?\n/);
                        if (lines.length < 2) return;

                        if (!confirm("Esta acción BORRARÁ toda la base de datos actual y cargará el contenido del CSV. ¿Deseas continuar?")) return;

                        setLoading(true);
                        try {
                            const inventoryCol = collection(db, 'artifacts', appId, 'users', user.uid, 'inventory');
                            const existingDocs = await getDocs(inventoryCol);
                            const deleteBatch = writeBatch(db);
                            existingDocs.forEach(d => deleteBatch.delete(d.ref));
                            await deleteBatch.commit();

                            const addBatch = writeBatch(db);
                            for (let i = 1; i < lines.length; i++) {
                                if (!lines[i].trim()) continue;
                                const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                                if (cols.length < 5) continue;
                                const clean = (str) => str.replace(/^"|"$/g, '').trim();
                                const item = {
                                    name: clean(cols[0]),
                                    cat: clean(cols[1]),
                                    zone: clean(cols[2]),
                                    status: clean(cols[3]).toLowerCase() === 'tengo' ? 'comprado' : 'comprar',
                                    ready: clean(cols[4]).toUpperCase() === 'SI',
                                    timestamp: Date.now() + i
                                };
                                const newDocRef = doc(inventoryCol);
                                addBatch.set(newDocRef, item);
                            }
                            await addBatch.commit();
                        } catch (err) {
                            console.error("Import Error:", err);
                        } finally {
                            setLoading(false);
                            if (fileInputRef.current) fileInputRef.current.value = '';
                        }
                    };
                    reader.readAsText(file);
                };

                const addItemCloud = async (e) => {
                    e.preventDefault();
                    if (!newItem.name.trim() || !user) return;
                    const inventoryCol = collection(db, 'artifacts', appId, 'users', user.uid, 'inventory');
                    await addDoc(inventoryCol, { ...newItem, status: 'comprar', ready: false, timestamp: Date.now() });
                    setNewItem({ ...newItem, name: '' });
                };

                const toggleStatusCloud = async (item) => {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'inventory', item.id);
                    await updateDoc(docRef, { status: item.status === 'comprado' ? 'comprar' : 'comprado' });
                };

                const toggleReadyCloud = async (item) => {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'inventory', item.id);
                    await updateDoc(docRef, { ready: !item.ready });
                };

                const deleteItemCloud = async (id) => {
                    if(window.confirm("¿Eliminar objeto?")) {
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'inventory', id);
                        await deleteDoc(docRef);
                    }
                };

                const saveEditCloud = async () => {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'inventory', editId);
                    await updateDoc(docRef, { ...editForm });
                    setEditId(null);
                };

                const requestSort = (key) => {
                    let direction = 'asc';
                    if (sortConfig.key === key && sortConfig.direction === 'asc') {
                        direction = 'desc';
                    }
                    setSortConfig({ key, direction });
                };

                const sortedAndFilteredItems = useMemo(() => {
                    let result = items.filter(i => {
                        const matchCat = catFilter === 'All' || i.cat === catFilter;
                        const matchZone = zoneFilter === 'All' || i.zone === zoneFilter;
                        return matchCat && matchZone;
                    });

                    if (sortConfig.key) {
                        result.sort((a, b) => {
                            let valA = a[sortConfig.key];
                            let valB = b[sortConfig.key];
                            if (typeof valA === 'boolean') {
                                valA = valA ? 1 : 0;
                                valB = valB ? 1 : 0;
                            } else {
                                valA = (valA || "").toString().toLowerCase();
                                valB = (valB || "").toString().toLowerCase();
                            }
                            if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                            if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                            return 0;
                        });
                    }
                    return result;
                }, [items, catFilter, zoneFilter, sortConfig]);

                const getCatIconClass = (cat) => {
                    switch (cat) {
                        case "Hardware y Almacenaje": return "fa-solid fa-map-location-dot text-blue-500";
                        case "Ropa de Ciclismo": return "fa-solid fa-shirt text-orange-500";
                        case "Sistema de Sueño": return "fa-solid fa-tent text-indigo-500";
                        case "Ropa de Campamento": return "fa-solid fa-campground text-emerald-500";
                        case "Herramientas y Repuestos": return "fa-solid fa-screwdriver-wrench text-slate-500";
                        case "Electrónica": return "fa-solid fa-bolt text-yellow-500";
                        case "Salud y Aseo": return "fa-solid fa-heart-pulse text-red-500";
                        case "Logística y Nutrición": return "fa-solid fa-apple-whole text-amber-600";
                        default: return "fa-solid fa-circle-info text-slate-400";
                    }
                };

                const SortIndicator = ({ columnKey }) => {
                    if (sortConfig.key !== columnKey) return <i className="fa-solid fa-sort ml-1.5 opacity-20 text-[9px]"></i>;
                    return sortConfig.direction === 'asc' 
                        ? <i className="fa-solid fa-sort-up ml-1.5 text-blue-500"></i> 
                        : <i className="fa-solid fa-sort-down ml-1.5 text-blue-500"></i>;
                };

                if (loading) return (
                    <div className="flex flex-col items-center justify-center min-h-screen text-slate-400">
                        <i className="fa-solid fa-circle-notch fa-spin text-4xl mb-4 text-blue-500"></i>
                        <p className="font-bold uppercase tracking-widest text-[10px] tracking-[0.3em]">Cargando...</p>
                    </div>
                );

                if (!user) return (
                    <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-slate-50 dark:bg-slate-900 fade-in">
                        <div className="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-700 max-w-sm w-full text-center">
                            <div className="bg-slate-800 dark:bg-slate-700 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg transform rotate-3">
                                <i className="fa-solid fa-bicycle text-white text-4xl"></i>
                            </div>
                            <h1 className="text-2xl font-black text-slate-800 dark:text-white mb-2 tracking-tight">Bikepacking Cloud</h1>
                            <p className="text-slate-500 dark:text-slate-400 text-sm mb-8 italic">Gestión de inventario para tus rutas</p>
                            <button onClick={handleLogin} className="w-full bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 py-4 rounded-2xl flex items-center justify-center gap-3 font-bold text-slate-700 dark:text-white hover:bg-slate-50 dark:hover:bg-slate-600 transition-all shadow-sm active:scale-95">
                                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5" alt="G" />
                                Entrar con Google
                            </button>
                        </div>
                    </div>
                );

                return (
                    <div className="p-4 md:p-8 max-w-6xl mx-auto fade-in pb-24">
                        <header className="mb-6 bg-white/80 dark:bg-slate-800/80 p-5 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col md:flex-row justify-between items-center gap-6 header-blur sticky top-4 z-20 transition-all">
                            <div className="flex items-center gap-4 w-full md:w-auto">
                                <img src={user.photoURL} className="w-12 h-12 rounded-2xl border-2 border-white dark:border-slate-600 shadow-md" alt="Avatar" />
                                <div className="flex-1">
                                    <div className="flex items-center justify-between md:justify-start gap-3">
                                        <h1 className="text-lg font-black text-slate-800 dark:text-white leading-tight">{user.displayName.split(' ')[0]}</h1>
                                        
                                        <div className="flex gap-1 items-center ml-auto md:ml-0">
                                            <button onClick={() => setDarkMode(!darkMode)} className="p-1.5 w-8 h-8 flex items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 hover:text-blue-500 transition-all" title="Tema">
                                                {darkMode ? <i className="fa-solid fa-sun text-xs"></i> : <i className="fa-solid fa-moon text-xs"></i>}
                                            </button>
                                            
                                            <div className="h-4 w-[1px] bg-slate-200 dark:bg-slate-700 mx-0.5"></div>
                                            
                                            <button onClick={exportToCSV} className="p-1.5 w-8 h-8 flex items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 hover:text-blue-500 transition-all" title="Exportar CSV">
                                                <i className="fa-solid fa-file-export text-xs"></i>
                                            </button>
                                            
                                            <button onClick={() => fileInputRef.current?.click()} className="p-1.5 w-8 h-8 flex items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 hover:text-blue-500 transition-all" title="Importar CSV (Sobrescribe)">
                                                <i className="fa-solid fa-file-import text-xs"></i>
                                            </button>
                                            <input type="file" ref={fileInputRef} onChange={importCSV} accept=".csv" className="hidden" />

                                            <div className="h-4 w-[1px] bg-slate-200 dark:bg-slate-700 mx-0.5"></div>

                                            <button onClick={handleLogout} className="p-1.5 w-8 h-8 flex items-center justify-center rounded-lg bg-red-50 dark:bg-red-900/30 text-red-500 hover:bg-red-500 hover:text-white transition-all" title="Cerrar sesión">
                                                <i className="fa-solid fa-right-from-bracket text-xs"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <p className="text-slate-400 text-[8px] font-bold uppercase tracking-widest mt-0.5">Cloud Sync Enabled</p>
                                </div>
                            </div>
                            
                            <div className="flex gap-2 w-full md:w-auto">
                                <div className="flex-1 bg-slate-50 dark:bg-slate-700/50 px-3 py-2 rounded-xl border border-slate-100 dark:border-slate-700 text-center min-w-[70px]">
                                    <span className="block text-lg font-black text-slate-700 dark:text-slate-200">{items.length}</span>
                                    <span className="text-[8px] uppercase font-bold text-slate-400">Total</span>
                                </div>
                                <div className="flex-1 bg-blue-50 dark:bg-blue-900/30 px-3 py-2 rounded-xl border border-blue-100 dark:border-blue-900/50 text-center min-w-[70px]">
                                    <span className="block text-lg font-black text-blue-600 dark:text-blue-400">{items.filter(i=>i.status==='comprado').length}</span>
                                    <span className="text-[8px] uppercase font-bold text-blue-400">Tengo</span>
                                </div>
                                <div className="flex-1 bg-green-50 dark:bg-green-900/30 px-3 py-2 rounded-xl border border-green-100 dark:border-green-900/50 text-center min-w-[70px]">
                                    <span className="block text-lg font-black text-green-600 dark:text-green-400">{items.filter(i=>i.ready).length}</span>
                                    <span className="text-[8px] uppercase font-bold text-green-400">Listos</span>
                                </div>
                            </div>
                        </header>

                        <section className="mb-6 bg-white dark:bg-slate-800 p-5 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm transition-all focus-within:shadow-md">
                            <form onSubmit={addItemCloud} className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <input type="text" placeholder="Nuevo objeto..." className="bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 dark:text-white transition-all font-medium" value={newItem.name} onChange={e=>setNewItem({...newItem, name: e.target.value})} />
                                <select className="bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 p-3 rounded-xl text-sm outline-none dark:text-white font-medium" value={newItem.cat} onChange={e=>setNewItem({...newItem, cat: e.target.value})}>
                                    {categoriesList.map(c=><option key={c} value={c}>{c}</option>)}
                                </select>
                                <select className="bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 p-3 rounded-xl text-sm outline-none dark:text-white font-medium" value={newItem.zone} onChange={e=>setNewItem({...newItem, zone: e.target.value})}>
                                    {zonesList.map(z=><option key={z} value={z}>{z}</option>)}
                                </select>
                                <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-black py-3 mt-auto transition-all shadow-lg active:scale-95 flex items-center justify-center gap-2 uppercase tracking-widest">
                                    <i className="fa-solid fa-plus"></i> Añadir
                                </button>
                            </form>
                        </section>

                        {/* FILTROS MULTI-FILA DINÁMICOS */}
                        <div className="space-y-6 mb-8">
                            {/* Filtro Categoría */}
                            <div className="bg-white/40 dark:bg-slate-800/40 p-4 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-inner">
                                <div className="flex items-center gap-2 mb-3 ml-1">
                                    <i className="fa-solid fa-filter text-[10px] text-blue-500"></i>
                                    <span className="text-[10px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400">Filtrar por Categoría</span>
                                </div>
                                <div className="flex flex-wrap gap-2">
                                    <button 
                                        onClick={() => setCatFilter('All')} 
                                        className={`px-4 py-2 rounded-xl whitespace-nowrap text-[10px] font-black transition-all border uppercase tracking-wider ${catFilter === 'All' ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white dark:bg-slate-800 text-slate-500 border-slate-200 dark:border-slate-700 hover:border-slate-400'}`}
                                    >
                                        Todas
                                    </button>
                                    {categoriesList.map(cat => (
                                        <button 
                                            key={cat} 
                                            onClick={() => setCatFilter(cat)} 
                                            className={`px-4 py-2 rounded-xl whitespace-nowrap text-[10px] font-black transition-all border uppercase tracking-wider ${catFilter === cat ? 'bg-blue-600 text-white border-blue-600 shadow-md scale-105' : 'bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-slate-700 hover:border-slate-400'}`}
                                        >
                                            {cat}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Filtro Ubicación */}
                            <div className="bg-white/40 dark:bg-slate-800/40 p-4 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-inner">
                                <div className="flex items-center gap-2 mb-3 ml-1">
                                    <i className="fa-solid fa-suitcase text-[10px] text-orange-500"></i>
                                    <span className="text-[10px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400">Filtrar por Bolsa / Ubicación</span>
                                </div>
                                <div className="flex flex-wrap gap-2">
                                    <button 
                                        onClick={() => setZoneFilter('All')} 
                                        className={`px-4 py-2 rounded-xl whitespace-nowrap text-[10px] font-black transition-all border uppercase tracking-wider ${zoneFilter === 'All' ? 'bg-orange-500 text-white border-orange-500 shadow-md' : 'bg-white dark:bg-slate-800 text-slate-500 border-slate-200 dark:border-slate-700 hover:border-slate-400'}`}
                                    >
                                        Todas
                                    </button>
                                    {zonesList.map(zone => (
                                        <button 
                                            key={zone} 
                                            onClick={() => setZoneFilter(zone)} 
                                            className={`px-4 py-2 rounded-xl whitespace-nowrap text-[10px] font-black transition-all border uppercase tracking-wider ${zoneFilter === zone ? 'bg-orange-500 text-white border-orange-500 shadow-md scale-105' : 'bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-slate-700 hover:border-slate-400'}`}
                                        >
                                            {zone}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden overflow-x-auto">
                            <table className="w-full text-left border-collapse text-sm min-w-[750px]">
                                <thead className="bg-slate-50 dark:bg-slate-700/50 border-b border-slate-200 dark:border-slate-700 font-black text-slate-400 dark:text-slate-500 uppercase text-[9px] tracking-[0.15em]">
                                    <tr>
                                        <th className="p-5 cursor-pointer hover:text-blue-500 transition-colors group" onClick={()=>requestSort('name')}>
                                            <div className="flex items-center">
                                                Elemento <SortIndicator columnKey="name" />
                                            </div>
                                        </th>
                                        <th className="p-5 text-center cursor-pointer hover:text-blue-500 transition-colors group" onClick={()=>requestSort('status')}>
                                            <div className="flex items-center justify-center">
                                                Estado <SortIndicator columnKey="status" />
                                            </div>
                                        </th>
                                        <th className="p-5 text-center cursor-pointer hover:text-blue-500 transition-colors group" onClick={()=>requestSort('ready')}>
                                            <div className="flex items-center justify-center">
                                                Listo <SortIndicator columnKey="ready" />
                                            </div>
                                        </th>
                                        <th className="p-5 cursor-pointer hover:text-blue-500 transition-colors group" onClick={()=>requestSort('zone')}>
                                            <div className="flex items-center">
                                                Zona <SortIndicator columnKey="zone" />
                                            </div>
                                        </th>
                                        <th className="p-5 text-center">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 dark:divide-slate-700">
                                    {sortedAndFilteredItems.map(item => (
                                        <tr key={item.id} className={`hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors group ${editId === item.id ? 'bg-blue-50/60 dark:bg-blue-900/20' : ''}`}>
                                            <td className="p-5">
                                                {editId === item.id ? (
                                                    <div className="flex flex-col gap-2">
                                                        <input type="text" className="w-full border border-blue-200 dark:border-blue-900 p-2.5 rounded-xl text-sm font-bold bg-white dark:bg-slate-700 dark:text-white outline-none shadow-inner" value={editForm.name} onChange={e => setEditForm({...editForm, name: e.target.value})} autoFocus />
                                                        <select className="w-full border border-blue-200 dark:border-blue-900 p-2 rounded-xl text-[10px] uppercase font-bold bg-white dark:bg-slate-700 dark:text-white outline-none" value={editForm.cat} onChange={e => setEditForm({...editForm, cat: e.target.value})}>
                                                            {categoriesList.map(c => <option key={c} value={c}>{c}</option>)}
                                                        </select>
                                                    </div>
                                                ) : (
                                                    <div className="flex items-center gap-4">
                                                        <div className="bg-white dark:bg-slate-700 p-2.5 rounded-xl shadow-sm border border-slate-100 dark:border-slate-600 flex items-center justify-center w-11 h-11 shrink-0 group-hover:scale-110 transition-transform">
                                                            <i className={`${getCatIconClass(item.cat)} text-lg`}></i>
                                                        </div>
                                                        <div>
                                                            <p className="font-bold text-slate-800 dark:text-slate-200 leading-tight text-[15px]">{item.name}</p>
                                                            <p className="text-[9px] text-slate-400 dark:text-slate-500 uppercase font-black tracking-widest mt-0.5">{item.cat}</p>
                                                        </div>
                                                    </div>
                                                )}
                                            </td>
                                            <td className="p-5 text-center">
                                                <button onClick={()=>toggleStatusCloud(item)} className={`px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest shadow-sm transition-all transform active:scale-90 ${item.status==='comprado' ? 'bg-blue-600 dark:bg-blue-500 text-white' : 'bg-red-500 dark:bg-red-600 text-white'}`}>
                                                    {item.status}
                                                </button>
                                            </td>
                                            <td className="p-5 text-center">
                                                <button onClick={()=>toggleReadyCloud(item)} className="transition-all hover:scale-125 active:scale-75">
                                                    {item.ready ? (
                                                        <i className="fa-solid fa-circle-check text-green-500 text-2xl"></i>
                                                    ) : (
                                                        <i className="fa-solid fa-circle-exclamation text-yellow-500 dark:text-yellow-600 text-2xl opacity-20 dark:opacity-30 group-hover:opacity-100 transition-opacity"></i>
                                                    )}
                                                </button>
                                            </td>
                                            <td className="p-5">
                                                {editId === item.id ? (
                                                    <select className="w-full border border-blue-200 p-2 rounded-xl text-[10px] bg-white dark:bg-slate-700 dark:text-white font-bold outline-none uppercase" value={editForm.zone} onChange={e => setEditForm({...editForm, zone: e.target.value})}>
                                                        {zonesList.map(z => <option key={z} value={z}>{z}</option>)}
                                                    </select>
                                                ) : (
                                                    <span className="text-[10px] font-black bg-slate-100 dark:bg-slate-700 px-3 py-1.5 rounded-lg text-slate-500 dark:text-slate-400 border border-slate-200 dark:border-slate-600 uppercase tracking-tighter italic">
                                                        {item.zone}
                                                    </span>
                                                )}
                                            </td>
                                            <td className="p-5 text-center">
                                                <div className="flex items-center justify-center gap-2">
                                                    {editId === item.id ? (
                                                        <button onClick={saveEditCloud} className="p-2.5 bg-green-500 text-white rounded-xl shadow-md hover:bg-green-600 transition-colors"><i className="fa-solid fa-check text-xs"></i></button>
                                                    ) : (
                                                        <>
                                                            <button onClick={() => { setEditId(item.id); setEditForm({...item}); }} className="p-2.5 text-slate-400 dark:text-slate-500 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded-xl transition-all" title="Editar"><i className="fa-solid fa-pen-to-square text-xs"></i></button>
                                                            <button onClick={()=>deleteItemCloud(item.id)} className="p-2.5 text-slate-300 dark:text-slate-600 hover:text-red-500 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-xl transition-all" title="Borrar"><i className="fa-solid fa-trash text-xs"></i></button>
                                                        </>
                                                    )}
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                        <footer className="mt-12 flex flex-col items-center gap-3 text-slate-400 dark:text-slate-600 font-bold text-[10px] uppercase tracking-[0.3em]">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-[1px] bg-slate-200 dark:bg-slate-800"></div>
                                <i className="fa-solid fa-mountain-sun text-xl opacity-50"></i>
                                <div className="w-12 h-[1px] bg-slate-200 dark:bg-slate-800"></div>
                            </div>
                            <span>Bikepacking Prep • Essen 2026</span>
                        </footer>
                    </div>
                );
            };

            const rootElement = document.getElementById('root');
            if (rootElement) {
                const root = ReactDOM.createRoot(rootElement);
                root.render(<App />);
            }
        })();
    </script>
</body>
</html>
